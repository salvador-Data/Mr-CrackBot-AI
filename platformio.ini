; Mr. CrackBot AI — unified CYD + M5 Cardputer firmware
; Hacker Planet LLC · authorized lab use only — see SECURITY.md

[platformio]
default_envs = cyd-2432s028
src_dir = src
include_dir = include

[env]
platform = espressif32 @ ^6.9.0
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Iinclude
    -DMR_CRACKBOT_UNIFIED=1
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    arkhipenko/TaskScheduler@^3.8.5

; ── CYD ESP32-2432S028 ─────────────────────────────────────────────
[env:cyd-2432s028]
extends = env
board = esp32dev
upload_speed = 921600
board_build.partitions = min_spiffs.csv
build_src_filter =
    +<*>
    -<platform/cardputer/>
    -<crackbot_lab/lab_ble_nimble.cpp>
    -<crackbot_lab/lab_portal_sync.cpp>
build_flags =
    ${env.build_flags}
    -DMR_CRACKBOT_BOARD_CYD=1
    -DUSER_SETUP_LOADED
    -DUSE_HSPI_PORT
    -DILI9341_2_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DTOUCH_CS=33
    -DTOUCH_IRQ=36
lib_deps =
    ${env.lib_deps}
    bodmer/TFT_eSPI@^2.5.43
    tzapu/WiFiManager@^2.0.17
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    me-no-dev/ESPAsyncWebServer@^3.3.2
    me-no-dev/AsyncTCP@^3.2.12

; ── M5Stack Cardputer (ESP32-S3) ─────────────────────────────────────
[env:m5stack-cardputer]
extends = env
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
upload_speed = 1500000
build_src_filter =
    +<*>
    -<platform/cyd/>
    -<crackbot_lab/lab_ble_esp.cpp>
    -<crackbot_lab/lab_portal_async.cpp>
build_flags =
    ${env.build_flags}
    -DMR_CRACKBOT_BOARD_CARDPUTER=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    ${env.lib_deps}
    m5stack/M5Cardputer@^1.0.2
    h2zero/NimBLE-Arduino@^1.4.3

; M5 OS app packaging alias (same binary, manifest-friendly name)
[env:m5stack-crackbot]
extends = env:m5stack-cardputer
